<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>API Test Tool</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .test-result { margin: 10px 0; padding: 10px; border-radius: 5px; }
        .success { background-color: #d4edda; border: 1px solid #c3e6cb; }
        .error { background-color: #f8d7da; border: 1px solid #f5c6cb; }
        .info { background-color: #d1ecf1; border: 1px solid #bee5eb; }
        button { padding: 10px 20px; margin: 5px; cursor: pointer; }
        pre { background: #f8f9fa; padding: 10px; border-radius: 5px; overflow-x: auto; }
    </style>
</head>
<body>
    <h1>🔧 API Connectivity Test</h1>
    
    <div>
        <label for="apiUrl">Backend URL:</label>
        <input type="text" id="apiUrl" value="https://anne-umber.vercel.app" style="width: 300px; padding: 5px;">
        <button onclick="testAllEndpoints()">🚀 Test All Endpoints</button>
        <button onclick="clearResults()">🗑️ Clear Results</button>
    </div>

    <div id="results"></div>

    <script>
        const endpoints = [
            '/api/test',
            '/api/products',
            '/api/flash-products',
            '/api/users',
            '/api/orders',
            '/api/chat-sessions'
        ];

        async function testEndpoint(baseUrl, endpoint) {
            const fullUrl = baseUrl + endpoint;
            const resultDiv = document.createElement('div');
            resultDiv.className = 'test-result info';
            resultDiv.innerHTML = `<strong>Testing:</strong> ${fullUrl} <em>(Loading...)</em>`;
            document.getElementById('results').appendChild(resultDiv);

            try {
                const response = await fetch(fullUrl, {
                    method: 'GET',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                });

                if (response.ok) {
                    const data = await response.json();
                    resultDiv.className = 'test-result success';
                    resultDiv.innerHTML = `
                        <strong>✅ SUCCESS:</strong> ${fullUrl}<br>
                        <strong>Status:</strong> ${response.status}<br>
                        <strong>Response:</strong>
                        <pre>${JSON.stringify(data, null, 2)}</pre>
                    `;
                } else {
                    resultDiv.className = 'test-result error';
                    resultDiv.innerHTML = `
                        <strong>❌ FAILED:</strong> ${fullUrl}<br>
                        <strong>Status:</strong> ${response.status} ${response.statusText}<br>
                        <strong>Error:</strong> HTTP ${response.status}
                    `;
                }
            } catch (error) {
                resultDiv.className = 'test-result error';
                resultDiv.innerHTML = `
                    <strong>❌ ERROR:</strong> ${fullUrl}<br>
                    <strong>Error:</strong> ${error.message}<br>
                    <strong>Details:</strong> ${error.toString()}
                `;
            }
        }

        async function testAllEndpoints() {
            const baseUrl = document.getElementById('apiUrl').value.replace(/\/$/, '');
            document.getElementById('results').innerHTML = '<h2>🔍 Test Results</h2>';
            
            for (const endpoint of endpoints) {
                await testEndpoint(baseUrl, endpoint);
                // Small delay between requests
                await new Promise(resolve => setTimeout(resolve, 500));
            }
        }

        function clearResults() {
            document.getElementById('results').innerHTML = '';
        }

        // Auto-test on page load
        window.onload = () => {
            setTimeout(testAllEndpoints, 1000);
        };
    </script>
</body>
</html>
